<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Decision System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1 { margin-bottom:8px; }

#result {
  padding:12px 18px;
  display:inline-block;
  border-radius:999px;
  background:#1e293b;
  margin:15px 0;
  font-weight:bold;
}

.box {
  background:#1e293b;
  padding:16px;
  margin:10px;
  border-radius:12px;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  margin:6px;
  width:220px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.big {
  font-size:22px;
  font-weight:bold;
}

.note {
  color:#94a3b8;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>FX Decision Engine</h1>

<div class="box">
  <div>실제 환전소/은행 환율 입력</div>

  <input id="usdRub" placeholder="USD → RUB (예: 73.8)">
  <input id="rubKrw" placeholder="RUB → KRW (예: 20.9)">

  <br>
  <button onclick="calc()">환전 비교 분석</button>
</div>

<div id="result">입력 대기 중</div>

<div class="grid">

  <div class="box">
    <div>USD → KRW (경로 환산)</div>
    <div class="big" id="usdToKrw">-</div>
    <div class="note">USD → RUB → KRW</div>
  </div>

  <div class="box">
    <div>KRW → USD (경로 환산)</div>
    <div class="big" id="krwToUsd">-</div>
    <div class="note">KRW → RUB → USD</div>
  </div>

</div>

</div>

<script>

function calc() {

  const usdRub = parseFloat(document.getElementById("usdRub").value);
  const rubKrw = parseFloat(document.getElementById("rubKrw").value);

  if (!usdRub || !rubKrw) {
    document.getElementById("result").innerText = "값을 입력해주세요";
    return;
  }

  // =========================
  // 1. KRW 기준 150만원 → USD → RUB
  // =========================
  const krw = 1500000;

  const usd = krw / rubKrw / usdRub;

  const krwFromUsd = usd * usdRub * rubKrw;

  // =========================
  // 2. USD 기준 1000 → KRW
  // =========================
  const usdAmount = 1000;

  const rubFromUsd = usdAmount * usdRub;
  const krwFromUsd2 = rubFromUsd * rubKrw;

  // =========================
  // 3. 비교
  // =========================
  document.getElementById("usdToKrw").innerText =
    Math.round(krwFromUsd2).toLocaleString();

  document.getElementById("krwToUsd").innerText =
    usd.toFixed(2);

  let result = "";

  if (krwFromUsd2 > krw) {
    result = "💵 USD 경로가 유리 (달러 보유/환전 추천)";
  } else {
    result = "🇰🇷 KRW 경로가 유리 (원화 유지/환전 추천)";
  }

  document.getElementById("result").innerText = result;
}

</script>

</body>
</html>
