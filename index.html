<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 28px 60px;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: 32px;
    }

    .sub {
      color: #cbd5e1;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .status {
      display: inline-block;
      margin: 10px 0 22px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #1e293b;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 20px auto 34px;
    }

    .card {
      background: #1e293b;
      padding: 22px 16px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .value {
      font-size: 27px;
      font-weight: bold;
    }

    .unit {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .chart-box {
      background: #111827;
      border-radius: 18px;
      padding: 28px 34px 26px;
      margin: 0 auto 26px;
      max-width: 1040px;
      height: 520px;
      box-sizing: border-box;
    }

    .button-row {
      margin: 16px 0 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      font-size: 14px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #334155;
      text-align: right;
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    th {
      background: #1e293b;
      color: #cbd5e1;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .chart-box {
        height: 460px;
        padding: 22px 18px;
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 18px 14px 40px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }

      .chart-box {
        height: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FX Dashboard</h1>
    <div class="sub" id="today">오늘 날짜: -</div>

    <div class="status" id="status">환율 판단 중...</div>

    <div class="grid">
      <div class="card">
        <h2>USD/RUB</h2>
        <div class="value" id="usdRub">-</div>
        <div class="unit">달러 → 루블</div>
      </div>

      <div class="card">
        <h2>KRW/RUB</h2>
        <div class="value" id="krwRub">-</div>
        <div class="unit">1루블 = 원화</div>
      </div>

      <div class="card">
        <h2>150만원 → RUB</h2>
        <div class="value" id="krwToRub">-</div>
        <div class="unit">원화 환전 기준</div>
      </div>

      <div class="card">
        <h2>1000 USD → RUB</h2>
        <div class="value" id="usdToRub">-</div>
        <div class="unit">달러 환전 기준</div>
      </div>
    </div>

    <div class="chart-box">
      <canvas id="mainChart"></canvas>
    </div>

    <div class="button-row">
      <button onclick="manualRefresh()">🔄 최신 데이터 다시 불러오기</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>USD/RUB</th>
            <th>KRW/RUB</th>
            <th>150만원→RUB</th>
            <th>1000USD→RUB</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>
      </table>
    </div>
  </div>

<script>
Chart.register(ChartDataLabels);

function formatNumber(n, digits = 2) {
  return Number(n).toLocaleString("ko-KR", {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits
  });
}

function formatInteger(n) {
  return Math.round(Number(n)).toLocaleString("ko-KR");
}

function todayText() {
  const d = new Date();
  return d.toLocaleDateString("ko-KR", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    weekday: "short"
  });
}

function manualRefresh() {
  location.href = location.pathname + "?v=" + new Date().getTime();
}

async function loadDashboard() {
  document.getElementById("today").innerText = "오늘 날짜: " + todayText();

  const response = await fetch("rates.json?v=" + new Date().getTime());
  const data = await response.json();

  const latest = data[data.length - 1];
  const prev = data[data.length - 2] || latest;

  const latestUsdRub = Number(latest.usd_rub);
  const latestKrwRub = Number(latest.krw_rub);

  document.getElementById("usdRub").innerText = formatNumber(latestUsdRub, 2);
  document.getElementById("krwRub").innerText = formatNumber(latestKrwRub, 2);
  document.getElementById("krwToRub").innerText = formatInteger(1500000 / latestKrwRub) + " RUB";
  document.getElementById("usdToRub").innerText = formatInteger(1000 * latestUsdRub) + " RUB";

  let status = "";

  if (latest.usd_rub > prev.usd_rub && latest.krw_rub < prev.krw_rub) {
    status = "⭐ 최고 상황: 달러·원화 모두 루블 환전 유리";
  } else if (latest.usd_rub > prev.usd_rub && latest.krw_rub >= prev.krw_rub) {
    status = "💵 달러 환전 유리";
  } else if (latest.usd_rub <= prev.usd_rub && latest.krw_rub < prev.krw_rub) {
    status = "🇰🇷 원화 환전 유리";
  } else {
    status = "⏸ 둘 다 보류";
  }

  document.getElementById("status").innerText = status;

  new Chart(document.getElementById("mainChart"), {
    type: "line",
    data: {
      labels: data.map(x => x.date),
      datasets: [
        {
          label: "USD/RUB",
          data: data.map(x => Number(x.usd_rub)),
          borderColor: "#f59e0b",
          backgroundColor: "#f59e0b",
          yAxisID: "y",
          tension: 0.25,
          pointRadius: 5,
          pointHoverRadius: 7
        },
        {
          label: "KRW/RUB",
          data: data.map(x => Number(x.krw_rub)),
          borderColor: "#06b6d4",
          backgroundColor: "#06b6d4",
          yAxisID: "y1",
          tension: 0.25,
          pointRadius: 5,
          pointHoverRadius: 7
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: {
          left: 36,
          right: 48,
          top: 30,
          bottom: 20
        }
      },
      plugins: {
        legend: {
          labels: {
            color: "#e5e7eb",
            font: { size: 14 }
          }
        },
        tooltip: {
          enabled: true
        },
        datalabels: {
          color: "#e5e7eb",
          align: "top",
          anchor: "end",
          font: {
            size: 11,
            weight: "bold"
          },
          formatter: function(value) {
            return Number(value).toFixed(2);
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: "#cbd5e1",
            maxRotation: 45,
            minRotation: 45
          },
          grid: {
            color: "rgba(148,163,184,0.15)"
          }
        },
        y: {
          position: "left",
          ticks: { color: "#f59e0b" },
          grid: { color: "rgba(148,163,184,0.15)" },
          title: {
            display: true,
            text: "USD/RUB",
            color: "#f59e0b"
          }
        },
        y1: {
          position: "right",
          ticks: { color: "#06b6d4" },
          grid: { drawOnChartArea: false },
          title: {
            display: true,
            text: "KRW/RUB",
            color: "#06b6d4"
          }
        }
      }
    }
  });

  const table = document.getElementById("dataTable");
  table.innerHTML = "";

  data.slice().reverse().forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.date}</td>
      <td>${formatNumber(row.usd_rub, 2)}</td>
      <td>${formatNumber(row.krw_rub, 2)}</td>
      <td>${formatInteger(1500000 / row.krw_rub)} RUB</td>
      <td>${formatInteger(1000 * row.usd_rub)} RUB</td>
    `;
    table.appendChild(tr);
  });
}

loadDashboard();
</script>
</body>
</html>
